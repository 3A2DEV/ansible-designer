# .github/labeler.yml — PR auto-labelling via actions/labeler@v6
# Matching logic: any-glob-to-any-file = label is applied if ANY pattern matches ANY changed file.

skill-playbook:
- changed-files:
  - any-glob-to-any-file:
    - skills/new-playbook/**
    - skills/review-playbook/**
    - skills/update-playbook/**
    - skills/ansible-designer/references/playbook.md

skill-role:
- changed-files:
  - any-glob-to-any-file:
    - skills/new-role/**
    - skills/review-role/**
    - skills/update-role/**
    - skills/ansible-designer/references/role.md

skill-collection:
- changed-files:
  - any-glob-to-any-file:
    - skills/new-collection/**
    - skills/review-collection/**
    - skills/update-collection/**
    - skills/ansible-designer/references/collection.md

skill-conf:
- changed-files:
  - any-glob-to-any-file:
    - skills/new-conf/**
    - skills/review-conf/**
    - skills/update-conf/**
    - skills/ansible-designer/references/ansible_cfg.md

skill-core:
- changed-files:
  - any-glob-to-any-file:
    - skills/ansible-designer/SKILL.md
    - skills/ansible-designer/references/discovery.md
    - skills/ansible-designer/references/best_practices.md
    - skills/ansible-designer/references/inventory.md

examples:
- changed-files:
  - any-glob-to-any-file:
    - examples/**

ci:
- changed-files:
  - any-glob-to-any-file:
    - .github/workflows/**
    - .github/labeler.yml
    - scripts/**
    - package.json

docs:
- changed-files:
  - any-glob-to-any-file:
    - README.md
    - CONTRIBUTING.md
    - CHANGELOG.md
    - docs/**
